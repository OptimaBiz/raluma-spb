<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо за заявку | Raluma</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://raluma.com.ru/thanks.html">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/raluma-06.png">
  <style>
    body { margin: 0; font-family: "Montserrat", Arial, sans-serif; background: #f5f6f8; color: #0f172a; }
    .thanks { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .thanks__card { max-width: 640px; width: 100%; background: #fff; border-radius: 20px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12); padding: 40px 32px; text-align: center; }
    .thanks__title { margin: 0 0 12px; font-size: 36px; line-height: 1.2; }
    .thanks__text { margin: 0 0 28px; font-size: 20px; line-height: 1.4; color: #334155; }
    .thanks__btn { display: inline-block; border-radius: 999px; padding: 14px 28px; background: #fe0000; color: #fff; text-decoration: none; font-weight: 600; }
    .thanks__btn:hover, .thanks__btn:focus-visible { background: #cb0000; }
    @media (max-width: 640px) {
      .thanks__card { padding: 28px 20px; }
      .thanks__title { font-size: 28px; }
      .thanks__text { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="thanks">
    <section class="thanks__card" aria-labelledby="thanks-title">
      <h1 id="thanks-title" class="thanks__title">Спасибо, заявка отправлена</h1>
      <p class="thanks__text">Мы свяжемся с вами в ближайшее время</p>
      <a class="thanks__btn" href="/">Вернуться на главную</a>
    </section>
  </main>
</body>
</html>
